<!DOCTYPE html>
<html>
<head>
    <title>Reservas</title>
</head>
<body>

<h2>Gestión de Reservas</h2>

<form method="POST" action="/guardar_reserva">
    <input type="number" name="cliente_id" placeholder="ID Cliente" required>
    <input type="date" name="fecha" required>
    <input type="text" name="descripcion" placeholder="Descripción" required>
    <button type="submit">Guardar</button>
</form>

<br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Fecha</th>
        <th>Descripción</th>
        <th>Acción</th>
    </tr>

    {% for r in reservas %}
    <tr>
        <td>{{ r.id_reserva }}</td>
        <td>{{ r.nombre }}</td>
        <td>{{ r.fecha }}</td>
        <td>{{ r.descripcion }}</td>
        <td>
            <a href="/eliminar_reserva/{{ r.id_reserva }}">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="/">Volver al inicio</a>

</body>
</html>
