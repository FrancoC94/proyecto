<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- 🔥 TÍTULO DINÁMICO -->
    <title>{% block title %}Proyecto{% endblock %}</title>

    <!-- 🔥 BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 CSS PROPIO -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>

<body>

    <!-- 🔥 HEADER -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">🛒 Tienda Online</span>

        <div>
            <a href="/" class="btn btn-light btn-sm">Inicio</a>
            <a href="/clientes" class="btn btn-light btn-sm">Clientes</a>
            <a href="/reservas" class="btn btn-light btn-sm">Reservas</a>
            <a href="/reporte" class="btn btn-warning btn-sm">PDF</a>
            <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
        </div>
    </nav>

    <!-- 🔥 CONTENIDO -->
    <div class="container mt-4 p-4 bg-white rounded shadow-sm">
        {% block content %}
        {% endblock %}
    </div>

    <!-- 🔥 FOOTER -->
    <footer class="text-center mt-4 mb-2">
        <hr>
        <p>© 2026 Mi Proyecto Flask</p>
    </footer>

</body>
</html>
